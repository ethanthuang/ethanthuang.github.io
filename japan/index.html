function togglePhoto(btn, pid) {
  const panel = btn.closest('.slot-body').querySelector('.photo-panel');
  if (!panel) return;
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  btn.style.opacity = open ? '0.5' : '1';
}
function badgeClass(city) {
  return {tokyo:'b-tokyo',kyoto:'b-kyoto',osaka:'b-osaka',kobe:'b-kobe',hakone:'b-hakone',travel:'b-travel'}[city]||'b-travel';
}
function badgeLabel(city) {
  return {tokyo:'Tokyo',kyoto:'Kyoto',osaka:'Osaka',kobe:'Kobe',hakone:'Hakone',travel:'Travel'}[city]||city;
}
function tagHtml(tags) {
  if(!tags||!tags.length) return '';
  const map = {must:'★ must',book:'📅 book',early:'🌅 early',group:'👥 group'};
  const cls = {must:'t-must',book:'t-book',early:'t-early',group:'t-group'};
  return '<span class="tags">'+tags.map(t=>`<span class="tag ${cls[t]||'t-must'}">${map[t]||t}</span>`).join('')+'</span>';
}

let currentFilter = 'all';

function render() {
  const container = document.getElementById('days');
  container.innerHTML = '';
  D.forEach((day, i) => {
    if (currentFilter !== 'all' && day.city !== currentFilter) return;
    const div = document.createElement('div');
    div.className = 'day';
    div.innerHTML = `
<div class="day-hdr" onclick="toggle(${i})">
  <span class="city-badge ${badgeClass(day.city)}">${badgeLabel(day.city)}</span>
  <span class="day-title">${day.label}</span>
  <div class="day-right">
    ${day.est ? `<span class="day-cost">${day.est}</span>` : ''}
    <span class="day-date">${day.date}</span>
    <span class="chev" id="chev-${i}">▼</span>
  </div>
</div>
<div class="day-body" id="body-${i}">
  ${day.note ? `<div class="day-note">${day.note}</div>` : ''}
  <div class="slots">
    ${day.slots.map(s => `
<div class="slot${s.pid ? ' slot-has-photo' : ''}">
  <span class="slot-time">${s.t}</span>
  <div class="dot d-${s.d}"></div>
  <div class="slot-body">
    <div class="slot-row">
      <span class="slot-text">${s.text}</span>
      ${s.price ? `<span class="slot-price">💴 ${s.price}</span>` : ''}
      ${tagHtml(s.tags)}
      ${s.pid ? `<button class="photo-btn" onclick="togglePhoto(this,'${s.pid}')">📷</button>` : ''}
    </div>
    ${s.note ? `<div class="slot-note">${s.note}</div>` : ''}
    ${s.pid ? `<div class="photo-panel" style="display:none"><a class="maps-link" href="https://www.google.com/maps/place/?q=place_id:${s.pid}" target="_blank">📍 View photos &amp; details on Google Maps →</a></div>` : ''}
  </div>
</div>`).join('')}
  </div>
</div>`;
    container.appendChild(div);
  });
}

function toggle(i) {
  const b = document.getElementById('body-'+i);
  const c = document.getElementById('chev-'+i);
  if (!b) return;
  b.classList.toggle('open');
  if (c) c.classList.toggle('open');
}

function filter(city, btn) {
  currentFilter = city;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
