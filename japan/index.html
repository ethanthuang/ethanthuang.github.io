<style>

  :root { --mapw: 50vw; }
  .wrap { width: 100%; }
  .layout { display: flex; align-items: flex-start; }
  .main { flex: 1; min-width: 0; }

  @media (max-width: 880px){
    .layout { flex-direction: column; }
    .map-panel { width: 100% !important; height: 380px; position: relative; border-left: none; border-top: 1px solid #e8e7e4; }
    .size-ctrl { display: none !important; }
  }

  /* Header */
  .header { background: #1a1a18; color: #f7f6f3; padding: 22px 24px 18px; }
  .header h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.4px; }
  .pills { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 14px; }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #2e2e2c; color: #ccc; letter-spacing: 0.2px; }
  .pill.green { background: #16331f; color: #6dbd6d; }
  .pill.dim { background: transparent; border: 1px solid #3a3a37; color: #888; }

  /* Filters */
  .filters { display: flex; gap: 6px; padding: 11px 24px; background: #fff; border-bottom: 1px solid #e8e7e4; flex-wrap: wrap; position: sticky; top: 0; z-index: 5; }
  .f-btn { font-size: 12px; padding: 4px 13px; border-radius: 20px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #555; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .f-btn:hover { border-color: #bbb; }
  .f-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .f-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* Map panel */
  .map-head { display: flex; align-items: center; gap: 9px; padding: 11px 14px; flex-wrap: wrap; border-bottom: 1px solid #f0eeea; flex-shrink: 0; }
  .map-title { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
  .map-hint { font-size: 10.5px; color: #b0aea8; }
  .map-right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .size-ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #b0aea8; }
  .size-ctrl input[type=range] { width: 92px; accent-color: #8b6fc9; cursor: pointer; }
  .map-regions { display: flex; gap: 5px; flex-wrap: wrap; }
  .r-btn { font-size: 11px; padding: 3px 10px; border-radius: 16px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; }
  .r-btn:hover { border-color: #999; color: #222; }
  #map { flex: 1; min-height: 0; width: 100%; background: #cddee8; }
  .leaflet-popup-content { font-size: 12.5px; line-height: 1.5; }
  .leaflet-popup-content a { color: #3a6ea5; }

  /* Days */
  .days { padding: 14px 16px 60px; display: flex; flex-direction: column; gap: 9px; }
  .day { background: #fff; border-radius: 11px; border: 1px solid #e8e7e4; overflow: hidden; }
  .day.empty-by-filter { display: none; }
  .day-head { display: flex; align-items: baseline; gap: 11px; padding: 13px 16px; cursor: pointer; user-select: none; }
  .day-head:hover { background: #fafaf8; }
  .day-date { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; white-space: nowrap; }
  .day-label { font-size: 12px; color: #8a8a86; flex: 1; }
  .day-count { font-size: 11px; color: #b0b0ac; }
  .chev { font-size: 10px; color: #c0c0bc; transition: transform 0.2s; }
  .day.collapsed .chev { transform: rotate(-90deg); }
  .day.collapsed .slots { display: none; }

  .slots { padding: 2px 0 10px; }

  /* Slot */
  .slot { display: flex; gap: 11px; padding: 7px 18px 7px 16px; position: relative; --rowbg: #fff; }
  .slot.hidden-by-filter { display: none; }
  .slot.mappable { cursor: pointer; }
  .slot.mappable:hover { background: #f0f7ff; --rowbg: #f0f7ff; }
  .slot.map-active { background: #ddeeff; --rowbg: #ddeeff; }
  .slot-time { font-size: 11.5px; color: #999; width: 52px; flex-shrink: 0; text-align: right; padding-top: 1px; font-variant-numeric: tabular-nums; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; position: relative; z-index: 1; box-shadow: 0 0 0 3px var(--rowbg); }
  .slot::before { content: ''; position: absolute; left: 82px; top: 0; bottom: 0; width: 1px; background: #eceae6; z-index: 0; }
  .slot:first-child::before { top: 8px; }
  .slot:last-child::before { bottom: calc(100% - 14px); }

  .d-travel  { background: #4a86c5; }
  .d-hotel   { background: #8b6fc9; }
  .d-food    { background: #d98a3d; }
  .d-activity{ background: #4a9d5b; }
  .d-shop    { background: #d2689a; }
  .d-note    { background: #b6b4ae; }

  .slot-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .slot-text { font-size: 13.5px; color: #20201d; }
  .slot-text a { color: #3a6ea5; text-decoration: none; border-bottom: 1px solid #c5d6e8; }
  .slot-text a:hover { border-bottom-color: #3a6ea5; }
  .slot-price { font-size: 11px; color: #b07a2a; background: #fbf3e4; padding: 1px 7px; border-radius: 5px; }
  .slot-dur { font-size: 11px; color: #3a6ea5; background: #eaf1f8; padding: 1px 7px; border-radius: 5px; font-variant-numeric: tabular-nums; }
  .slot-pin { font-size: 11px; opacity: 0.65; }
  .tag { font-size: 10px; padding: 1px 7px; border-radius: 5px; letter-spacing: 0.2px; text-transform: uppercase; font-weight: 600; }
  .tag-booked { background: #e7f3ea; color: #3c8651; }
  .tag-tobook { background: #fbf0e0; color: #b8842f; }
  .tag-plain  { background: #efeee9; color: #87857d; }

  .slot-note { font-size: 12px; color: #8e8c85; margin-top: 2px; }
  .slot-detail { font-size: 12px; color: #6f6d66; margin-top: 5px; padding: 8px 11px; background: #faf9f6; border-radius: 7px; border: 1px solid #efeee9; display: none; line-height: 1.55; }
  .slot-detail.open { display: block; }
  .slot-detail a { color: #3a6ea5; }
  .slot-detail .dl { display: flex; gap: 7px; margin-top: 2px; }
  .slot-detail .dl b { color: #57554e; font-weight: 600; min-width: 64px; }
  .det-toggle { margin-left: auto; flex-shrink: 0; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; color: #c2c0b9; cursor: pointer; font-size: 11px; border-radius: 6px; transition: transform .2s ease, color .15s, background .15s; }
  .det-toggle:hover { color: #666; background: #efeee9; }
  .det-toggle.open { transform: rotate(180deg); color: #8a887f; }

  .empty-slot { font-size: 12.5px; color: #c2c0ba; font-style: italic; padding: 6px 18px 6px 16px; }
  .footer { text-align: center; font-size: 11px; color: #b8b6b0; padding: 0 0 30px; }

let activeFilter = "all";
let sc = 0;

/* assign a stable marker id to every slot that has coordinates */
let _midSeq = 0;
DAYS.forEach(d => d.slots.forEach(s => { if (s.ll) s._mid = "p" + (++_midSeq); }));

/* ---------- HELPERS ---------- */
function stripTags(html){ const d=document.createElement("div"); d.innerHTML=html; return (d.textContent||"").replace(/^Check in:\s*/,""); }
function tagHtml(tags){
  if(!tags) return "";
  return tags.map(t=>{
    if(typeof t==="string"){
      if(t==="booked") return '<span class="tag tag-booked">booked</span>';
      if(t==="tobook") return '<span class="tag tag-tobook">to book</span>';
      return '<span class="tag tag-plain">'+t+'</span>';
    }
    return '<span class="tag tag-'+(t.c||'plain')+'">'+t.t+'</span>';
  }).join("");
}
function mapUrl(s){
  if(s.pid) return "https://www.google.com/maps/place/?q=place_id:"+s.pid;
  if(s.q)   return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(s.q);
  return null;
}

/* ---------- RENDER LIST ---------- */
function slotHtml(s){
  sc++;
  const detId="det-"+sc;
  const url=mapUrl(s);
  const hasMarker=!!s.ll;
  const hasMap=hasMarker||!!url;
  let clickAttr="", midAttr="";
  if(hasMarker){ clickAttr=` onclick="flyToSlot('${s._mid}')"`; midAttr=' data-mid="'+s._mid+'"'; }
  else if(url){ clickAttr=` onclick="openMap('${url}')"`; }
  const pin=hasMap?'<span class="slot-pin">📍</span>':"";
  const price=s.price?'<span class="slot-price">'+s.price+'</span>':"";
  const dur=s.dur?'<span class="slot-dur">⏱ '+s.dur+'</span>':"";
  const note=s.note?'<div class="slot-note">'+s.note+'</div>':"";
  const detToggle=s.detail?'<button class="det-toggle" onclick="event.stopPropagation();toggleDetail(this,\''+detId+'\')" aria-label="Toggle details">▾</button>':"";
  const detailBlock=s.detail?'<div class="slot-detail" id="'+detId+'">'+s.detail+'</div>':"";
  return '<div class="slot'+(hasMap?' mappable':'')+'" data-cat="'+s.d+'"'+midAttr+clickAttr+'>'
    +'<span class="slot-time">'+(s.t||"")+'</span>'
    +'<div class="dot d-'+s.d+'"></div>'
    +'<div class="slot-body"><div class="slot-row"><span class="slot-text">'+s.text+'</span>'+dur+price+tagHtml(s.tags)+pin+detToggle+'</div>'+note+detailBlock+'</div>'
    +'</div>';
}
function dayHtml(day, idx){
  const slots=day.slots.length?day.slots.map(slotHtml).join(""):'<div class="empty-slot">Nothing planned yet</div>';
  const count=day.slots.length?day.slots.length+(day.slots.length===1?" item":" items"):"open";
  return '<div class="day" data-day="'+idx+'">'
    +'<div class="day-head" onclick="toggleDay('+idx+')"><span class="day-date">'+day.date+'</span><span class="day-label">'+day.label+'</span><span class="day-count">'+count+'</span><span class="chev">▼</span></div>'
    +'<div class="slots">'+slots+'</div></div>';
}
function render(){
  sc=0;
  document.getElementById("days").innerHTML=DAYS.map(dayHtml).join("");
  document.getElementById("filters").innerHTML=CATS.map(c=>{
    const dot=c.color?'<span class="f-dot" style="background:'+c.color+'"></span>':"";
    return '<button class="f-btn'+(activeFilter===c.id?' active':'')+'" onclick="setFilter(\''+c.id+'\')">'+dot+c.label+'</button>';
  }).join("");
  applyFilter();
}
function applyFilter(){
  document.querySelectorAll(".day").forEach(dayEl=>{
    let visible=0;
    dayEl.querySelectorAll(".slot").forEach(slot=>{
      const show=activeFilter==="all"||slot.dataset.cat===activeFilter;
      slot.classList.toggle("hidden-by-filter",!show);
      if(show) visible++;
    });
    const isEmptyDay=!!dayEl.querySelector(".empty-slot");
    dayEl.classList.toggle("empty-by-filter", activeFilter!=="all" && (visible===0));
    if(isEmptyDay && activeFilter!=="all") dayEl.classList.add("empty-by-filter");
  });
}

/* ---------- MAP ---------- */
let map=null, markerLayer=null, markers={};
function collectPlaces(){
  const out=[];
  DAYS.forEach(day=>day.slots.forEach(s=>{ if(s.ll){ out.push({mid:s._mid, name:stripTags(s.text), cat:s.d, ll:s.ll, pid:s.pid, q:s.q, region:s.region, date:day.date}); }}));
  return out;
}
function markerIcon(cat){
  const c=CAT_COLOR[cat]||"#888";
  return L.divIcon({className:"", iconSize:[16,16], iconAnchor:[8,8],
    html:'<div style="width:14px;height:14px;border-radius:50%;background:'+c+';box-shadow:0 0 0 2px #fff,0 1px 3px rgba(0,0,0,.45)"></div>'});
}
function refreshMarkers(){
  if(!map||!markerLayer) return;
  markerLayer.clearLayers(); markers={};
  const places=collectPlaces().filter(p=>activeFilter==="all"||p.cat===activeFilter);
  const japanBounds=[];
  places.forEach(p=>{
    const url=p.pid?"https://www.google.com/maps/place/?q=place_id:"+p.pid:(p.q?"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(p.q):null);
    const m=L.marker(p.ll,{icon:markerIcon(p.cat)});
    m.bindTooltip(p.name,{direction:"top", offset:[0,-7], opacity:0.95});
    m.bindPopup('<b>'+p.name+'</b><br><span style="color:#999">'+p.date+'</span>'+(url?'<br><a href="'+url+'" target="_blank" rel="noopener">Open in Maps ↗</a>':''),{closeButton:false});
    m.addTo(markerLayer);
    markers[p.mid]=m;
    if(p.region!=="taipei") japanBounds.push(p.ll);
  });
  if(japanBounds.length) map.fitBounds(japanBounds,{padding:[34,34],maxZoom:12});
}

    style:{fillColor:"#eceae3", fillOpacity:1, color:"#d8d5cc", weight:1}}).addTo(map);

  // Faint English region labels for orientation
  const labelPane="labelpane"; map.createPane(labelPane); map.getPane(labelPane).style.zIndex=350;
  [["Tokyo",35.62,139.95],["Kyoto",35.28,135.62],["Osaka",34.45,135.42],["Taipei",24.92,121.42]].forEach(([nm,la,ln])=>{
    L.marker([la,ln],{pane:labelPane, interactive:false,
      icon:L.divIcon({className:"", iconSize:[80,16],
        html:'<span style="font-size:11px;color:#9a978e;font-weight:600;letter-spacing:.3px;white-space:nowrap">'+nm+'</span>'})}).addTo(map);
  });

  // Street tiles on top for full detail when opened in a browser (gracefully absent in sandbox preview)
  const base=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",
    {maxZoom:19, attribution:"Tiles \u00a9 Esri"});
  let switched=false;
  base.on("tileerror", function(){
    if(switched) return; switched=true;
    map.removeLayer(base);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      {subdomains:"abcd", maxZoom:19, attribution:"\u00a9 OpenStreetMap \u00a9 CARTO"}).addTo(map);
  });
  base.addTo(map);

  markerLayer=L.layerGroup().addTo(map);
  refreshMarkers();
}
function whenLeaflet(cb,n){ n=n||0; if(window.L){cb();} else if(n<60){ setTimeout(()=>whenLeaflet(cb,n+1),100);} }

/* ---------- INTERACTION ---------- */
function setFilter(id){
  activeFilter=id;
  document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));
  if(typeof event!=="undefined"&&event.currentTarget) event.currentTarget.classList.add("active");
  applyFilter();
  refreshMarkers();
}
function toggleDay(idx){ document.querySelector('.day[data-day="'+idx+'"]').classList.toggle("collapsed"); }
function toggleDetail(btn,id){ const el=document.getElementById(id); const open=el.classList.toggle("open"); btn.classList.toggle("open",open); }
function openMap(url){ window.open(url,"_blank","noopener"); }
function setMapW(v){
  document.documentElement.style.setProperty("--mapw", v+"vw");
  if(map) setTimeout(()=>map.invalidateSize(),30);
}
function flyToSlot(mid){ _fly(mid); }
function _fly(mid){
  const m=markers[mid];
  document.querySelectorAll(".slot.map-active").forEach(e=>e.classList.remove("map-active"));
  const el=document.querySelector('.slot[data-mid="'+mid+'"]'); if(el) el.classList.add("map-active");
  if(!map||!m) return;
  map.flyTo(m.getLatLng(), 15, {duration:0.8});
  setTimeout(()=>m.openPopup(), 820);
}
function flyTo(r){ if(!map) return; const [c,z]=REGIONS[r]; map.setView(c,z); }

render();
whenLeaflet(initMap);
</script>
